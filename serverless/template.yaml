AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Commitment Intelligent Platform - Serverless Stack

Parameters:
  SenderEmail:
    Type: String
    Description: Verified SES email address for sending notifications

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 256
    Environment:
      Variables:
        DOCUMENTS_BUCKET: !Ref DocumentsBucket
        TABLE_NAME: !Ref RecommendationsTable
        SENDER_EMAIL: !Ref SenderEmail
        BEDROCK_MODEL_ID: us.anthropic.claude-haiku-4-5-20251001-v1:0

Resources:

  # --- Storage ---
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']
            MaxAge: 3600

  FrontendBucket:
    Type: AWS::S3::Bucket

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDist}

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDist:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
        PriceClass: PriceClass_100

  RecommendationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # --- API ---
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowHeaders: ['*']
        AllowMethods: ['*']
        AllowOrigins: ['*']

  # --- Lambda Functions ---
  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: api.handle_upload
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DocumentsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref RecommendationsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /upload
            Method: POST

  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: api.handle_analyze
      Timeout: 10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RecommendationsTable
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt AnalyzeWorkerFunction.Arn
      Environment:
        Variables:
          ANALYZE_WORKER_ARN: !GetAtt AnalyzeWorkerFunction.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /analyze
            Method: POST

  AnalyzeWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: api.handle_analyze_worker
      Timeout: 180
      MemorySize: 512
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref RecommendationsTable
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: '*'
            - Effect: Allow
              Action: ce:GetCostAndUsage
              Resource: '*'

  RecommendationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: api.handle_recommendations
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RecommendationsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /recommendations
            Method: GET

  DecisionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: api.handle_decision
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RecommendationsTable
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /decision
            Method: POST

  HistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: api.handle_history
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RecommendationsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /history
            Method: GET

  SendEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: api.handle_send_email
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RecommendationsTable
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /send-email
            Method: POST

  SpendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: api.handle_spend
      Timeout: 30
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ce:GetCostAndUsage]
              Resource: '*'
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /spend
            Method: GET

  AttestationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: api.handle_attestations
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RecommendationsTable
      Events:
        Get:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /attestations
            Method: GET
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /attestations
            Method: POST

  ReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: api.handle_reminder
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RecommendationsTable
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'
      Events:
        DailyCheck:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Description: Check for attestations due within 7 days

Outputs:
  ApiUrl:
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com
  FrontendUrl:
    Value: !Sub https://${CloudFrontDist.DomainName}
  DocumentsBucket:
    Value: !Ref DocumentsBucket
  FrontendBucket:
    Value: !Ref FrontendBucket
